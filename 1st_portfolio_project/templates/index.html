<!DOCTYPE html>
<html class="masthead"
style="background-color:#FBDB93">
  <head>
    <style>
      body {
        font-family:"Urbanist";
      }
        .title-container {
            margin-left: 80px;
            gap: 80px;
            display: flex;
        }
        .title-container h1 {
          color:#BE5B50;
          font-size: 90px;
          font-weight: 900;
          margin: 0;
          padding-top: 100px;
        }
        .body-container {
            color:#9d4c43;
            margin-left: 100px;
            font-size: 40px;
            font-weight: 620;
            position: relative;
            top: 100px;

        }
        .title-container img {
          width: 200px;
          flex-shrink: 0;
        }
        .form-container {
            margin-left: 120px;
            margin-top: 50px;
            font-size: 40px;
            color: #9d4c43;
            font-weight: 600;
        }

        .form-container input[type="text"] {
            font-size: 50px;
            padding: 5px;
            margin-left: 15px;
        }

        .form-container input[type="submit"] {
            font-size: 30px;
            font-weight: 800;
            padding: 5px 15px;
            margin-top: 10px;
            margin-left: 15px;
            cursor: pointer;
            background-color: #BE5B50;
            color: #fff;
            border: none;
            border-radius: 5px;
        }

        h2.result-title {
            color: #9d4c43;
            margin-left: 120px;
            font-size: 37px;
            font-weight: 600;
            margin-top: 50px;
        }

        p.result {
            margin-left: 150px;
            font-size: 60px;
            color: #50586C;
            font-weight: 800;
        }        
        
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="utf-8" />
    <title>Morse code</title>
  </head>
  <body>
    <div class="title-container">
      <h1>Morse code converter</h1>
      <img src="./static/assets/morse-code.png" alt="Morse code">
  </div>

  <!-- Form -->
  <div class="form-container">
      <p>Write the text</p>
      <form method="POST">
          {{ form.hidden_tag() }}
          {{ form.text(size=40) }}
          <br>
          <input type="submit" value="Convert">
      </form>
  </div>

  <!-- Result -->
  {% if response %}
      <h2 class="result-title">Result:</h2>
      <p class="result">{{ response }}</p>
  {% endif %}
  </body>
